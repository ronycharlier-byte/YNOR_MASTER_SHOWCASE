name: Ynor V10 Absolute Validation (CI)

on:
  push:
    branches:
      - main
      - distribution-v10
  pull_request:
    branches:
      - main

jobs:
  test_total_diamond:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest fastapi uvicorn httpx numpy

      - name: Run FrontierMath Divergence Core Tests
        run: |
          echo "Démarrage des audits de stabilité H_alpha..."
          pytest tests/ -v
          
      - name: Execute CLI Dataset Validation
        run: |
          python 05_C_PRIME_VALIDATION_ET_TESTS/02_FRONTIER_MATH_DATASETS/ynor_frontier_math_eval.py
