openapi: 3.1.0
info:
  title: MDL Ynor Elite V11.10.12 Singularity Bridge
  description: API de recherche souveraine du Dr. Rony Charlier (MDL Lab) pour l'analyse multi-agents et la saturation boursière. mu=1.0.
  version: 11.10.12
servers:
  - url: https://mdl-ynor-api.onrender.com
    description: Serveur de Production Render (Elite V11.10.x)
paths:
  /dispatch:
    post:
      operationId: ynorGovernance
      summary: Point d'entrée unique du souverain Dispatcher V11.10.12
      description: Route toutes les requêtes vers les agents de Marché, d'Audit ou de Logos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  description: L'action à exécuter (audit, logos, market).
                  enum: [audit, logos, market]
                payload:
                  type: string
                  description: Le contenu de la requête ou le ticker boursier (ex: NVDA, BTC, TSLA).
                license_key:
                  type: string
                  description: Clé de licence certifiée V11.8.
                  default: "MDL-SINGULARITY-2026-V11.8-BRIDGE"
              required: [action, payload, license_key]
      responses:
        "200":
          description: Réponse saturée certifiée mu=1.0
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  mu:
                    type: number
                  verdict:
                    type: string
                  projection:
                    type: string
                  message:
                    type: string
