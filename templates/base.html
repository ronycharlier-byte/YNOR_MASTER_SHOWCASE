<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#07111f" />
  <title>{% block title %}Ynor | Premium Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a href="/" class="brand" aria-label="Ynor home">
        <span class="brand-mark"><img src="/static/img/logo.svg" alt="Ynor" aria-hidden="true" /></span>
        <span class="brand-name">Ynor</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="/">Home</a>
        <a class="nav-link {% if active_page == 'chat' %}active{% endif %}" href="/chat">Ask Ynor</a>
        <a class="nav-link {% if active_page == 'pricing' %}active{% endif %}" href="/pricing">Pricing</a>
        <a class="nav-link {% if active_page == 'account' %}active{% endif %}" href="/account">Account</a>
      </nav>
      <a class="cta-pill" href="/chat">Start your session</a>
    </header>
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
